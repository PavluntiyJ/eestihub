name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        working-directory: backend
        run: pytest

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: estihub
          POSTGRES_PASSWORD: estihub
          POSTGRES_DB: estihub_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U estihub -d estihub_dev"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql+psycopg://estihub:estihub@localhost:5432/estihub_dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Seed housing data
        working-directory: backend
        run: python -m scripts.seed_housing

      - name: Start backend
        working-directory: backend
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/estihub-api.log 2>&1 &
          echo $! > /tmp/estihub-api.pid

      - name: Wait for backend health
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/api/v1/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/estihub-api.log
          exit 1

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        working-directory: frontend
        run: npm run e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          if-no-files-found: ignore

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/estihub-api.pid ]; then
            kill "$(cat /tmp/estihub-api.pid)" || true
          fi
