name: Keep-alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
        run: |
          if [ -z "${BACKEND_URL}" ]; then
            echo "BACKEND_URL variable is not set — skipping keep-alive ping"
            exit 0
          fi
          curl --fail --max-time 30 "${BACKEND_URL}/api/v1/health"
